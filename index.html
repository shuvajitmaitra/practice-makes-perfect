<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Makes Perfect</title>
  <style>
    :root {
      --bg: #1f1f1f;
      --block-text: #505050;
      --script-text: #ffb700;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      display: grid;
      place-items: center;
      font-synthesis-weight: none;
      font-synthesis-style: none;
    }

    .poster {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      display: grid;
      place-items: center;
    }

    .quote {
      position: relative;
      width: min(92vw, 760px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: calc(0.72em + 10px);
    }

    .block {
      position: relative;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-size: calc(clamp(4.4rem, 10vw, 8rem) + 10px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--block-text);
      text-transform: lowercase;
      white-space: nowrap;
    }

    .script {
      position: absolute;
      left: 50%;
      top: 45.5%;
      transform: translate(-50%, -50%);
      font-family: "Brush Script MT", "Segoe Script", cursive;
      font-size: clamp(5.2rem, 11vw, 9rem);
      line-height: 1;
      color: var(--script-text);
      white-space: nowrap;
      z-index: 2;
    }

    @media (max-width: 560px) {
      .block {
        font-size: calc(clamp(3.5rem, 12vw, 5.8rem) + 10px);
      }

      .script {
        font-size: clamp(4.5rem, 15vw, 7rem);
      }
    }
  </style>
</head>
<body>
  <main class="poster">
    <section class="quote" aria-label="practice makes perfect">
      <div class="block top">practice</div>
      <div class="script">makes</div>
      <div class="block bottom">perfect</div>
    </section>
  </main>
</body>
</html>
